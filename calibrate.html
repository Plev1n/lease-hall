<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Map Calibration</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #fff; font-family: monospace; }
#coords { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 8px; font-size: 14px; max-height: 90vh; overflow-y: auto; }
#coords .click { margin: 2px 0; }
img { width: 100%; display: block; cursor: crosshair; }
.wrapper { position: relative; }
.dot { position: absolute; width: 8px; height: 8px; background: red; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
</style>
</head>
<body>
<div id="coords">Click on building corners. Format: x, y (in 3508x2480 space)<br><br></div>
<div class="wrapper" id="wrapper">
<img src="assets/map-schema.png" id="img">
</div>
<script>
const img = document.getElementById('img');
const wrapper = document.getElementById('wrapper');
const coords = document.getElementById('coords');
const W = 3508, H = 2480;

wrapper.addEventListener('click', (e) => {
    const rect = img.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width;
    const yPct = (e.clientY - rect.top) / rect.height;
    const x = Math.round(xPct * W);
    const y = Math.round(yPct * H);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.left = (xPct * 100) + '%';
    dot.style.top = (yPct * 100) + '%';
    wrapper.appendChild(dot);

    const line = document.createElement('div');
    line.className = 'click';
    line.textContent = `${x}, ${y}`;
    coords.appendChild(line);

    console.log(`${x}, ${y}`);
});
</script>
</body>
</html>
